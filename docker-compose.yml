# ==============================================================================
# Docker Compose - Laravel 13 Development Environment
# ==============================================================================

services:
  # ============================================================================
  # PHP-FPM Application
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: www
        uid: 1000
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel-network
    depends_on:
      mysql:
        condition: service_healthy

  # ============================================================================
  # Nginx Webserver
  # ============================================================================
  webserver:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-network
    depends_on:
      - app

  # ============================================================================
  # MySQL Database
  # ============================================================================
  mysql:
    image: mysql:8.0
    container_name: laravel-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laravel-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  mysql-data:
    driver: local

# ==============================================================================
# Networks
# ==============================================================================
networks:
  laravel-network:
    driver: bridge
